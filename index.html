<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS Generator & Sublink</title>
    <style>
        :root { 
            --bg-color: #0f172a; --container-bg: #1e293b; --text-color: #f8fafc; 
            --input-bg: #334155; --border-color: #475569; --primary-color: #3b82f6; 
            --primary-hover: #2563eb; --success-color: #10b981; --warning-color: #f59e0b; 
            --accent-color: #8b5cf6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--container-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); width: 100%; max-width: 550px; }
        
        /* Tab Styling */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-color); padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.3s; width: auto; margin-top: 0; }
        .tab-btn.active { background-color: var(--primary-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { text-align: center; margin-top: 0; margin-bottom: 25px; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-family: monospace; }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); }
        
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        
        .proxy-section { background-color: #283548; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .proxy-section h4 { margin: 0 0 15px 0; color: var(--warning-color); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        button:hover { background-color: var(--primary-hover); }
        
        .btn-sublink { background-color: var(--accent-color); }
        .btn-sublink:hover { background-color: #7c3aed; }

        .result-box { margin-top: 25px; display: none; }
        textarea { width: 100%; height: 150px; padding: 10px; background-color: #000; color: #0f0; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-family: monospace; resize: vertical; word-break: break-all; font-size: 12px; }
        .copy-btn { background-color: var(--success-color); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>VLESS Web Tool</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'single')">Single Link</button>
            <button class="tab-btn" onclick="openTab(event, 'sublink')">Sublink</button>
        </div>

        <div class="form-group">
            <label for="uuid">User UUID</label>
            <input type="text" id="uuid" placeholder="Loading UUID...">
        </div>

        <div class="row">
            <div class="form-group" style="flex: 2;">
                <label for="address">Address (Worker/Pages Domain)</label>
                <input type="text" id="address" placeholder="contoh.pages.dev" value="contoh.pages.dev">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="port">Port</label>
                <input type="number" id="port" value="443">
            </div>
        </div>

        <div id="single" class="tab-content active">
            <div class="proxy-section">
                <h4>🌐 Pilih Proxy</h4>
                <div class="row">
                    <div class="form-group">
                        <label>Negara</label>
                        <select id="countrySelect"><option>Loading...</option></select>
                    </div>
                    <div class="form-group">
                        <label>Provider</label>
                        <select id="proxySelect" disabled><option>Pilih Negara</option></select>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Bug / SNI</label>
                <input type="text" id="sni" value="bug.com">
            </div>

            <button onclick="generateSingle()">Buat Satu Link</button>
        </div>

        <div id="sublink" class="tab-content">
            <div class="proxy-section" style="border-color: var(--accent-color);">
                <h4>🚀 Bulk Generator (Semua Proxy)</h4>
                <p style="font-size: 12px; color: #cbd5e1; margin-bottom: 10px;">
                    Fitur ini akan menghasilkan link VLESS untuk <b>semua</b> proxy yang ada di database anda secara automatik.
                </p>
                <div class="form-group">
                    <label style="color: var(--accent-color);">Masukkan Bug / SNI Anda</label>
                    <input type="text" id="sublinkBug" placeholder="Masukkan bug untuk semua link..." value="m.youtube.com">
                    <small style="font-size: 11px; color: #94a3b8;">*Bug ini akan digunakan untuk semua akaun.</small>
                </div>
            </div>
            <button class="btn-sublink" onclick="generateAllSublinks()">Buat Semua Sublink</button>
        </div>

        <div class="result-box" id="resultBox">
            <h3 id="resultTitle" style="font-size: 16px; color: var(--success-color);">Tautan Berhasil Dibuat!</h3>
            <textarea id="vlessOutput" readonly></textarea>
            <button class="copy-btn" onclick="copyToClipboard()">Salin Semua</button>
        </div>
    </div>

    <script>
        let proxyData = {};

        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            document.getElementById('resultBox').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Generate UUID
            document.getElementById('uuid').value = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });

            // Load prolist.txt
            fetch('prolist.txt')
                .then(res => res.text())
                .then(text => {
                    const lines = text.split('\n');
                    let currentCountry = '';
                    lines.forEach(line => {
                        line = line.trim();
                        if (!line) return;
                        if (line.length <= 3 && !line.includes('.') && !line.includes(':')) {
                            currentCountry = line;
                            proxyData[currentCountry] = [];
                        } else if (currentCountry) {
                            const match = line.match(/^(\S+)\s+(.+)$/);
                            if (match) proxyData[currentCountry].push({ ipPort: match[1], name: match[2] });
                        }
                    });
                    populateUi();
                });
        });

        function populateUi() {
            const countrySel = document.getElementById('countrySelect');
            countrySel.innerHTML = '<option value="">-- Pilih Negara --</option>';
            Object.keys(proxyData).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = `${c} (${proxyData[c].length})`;
                countrySel.appendChild(opt);
            });

            countrySel.onchange = function() {
                const proxySel = document.getElementById('proxySelect');
                if (this.value) {
                    proxySel.disabled = false;
                    proxySel.innerHTML = '<option value="">-- Pilih Provider --</option>';
                    proxyData[this.value].forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.ipPort; opt.textContent = p.name;
                        proxySel.appendChild(opt);
                    });
                } else {
                    proxySel.disabled = true;
                }
            };
        }

        function createVlessLink(uuid, address, port, pathVal, bug, name) {
            const path = encodeURIComponent('/' + pathVal);
            const remarks = encodeURIComponent(name);
            return `vless://${uuid}@${address}:${port}?type=ws&security=tls&path=${path}&sni=${bug}&host=${bug}#${remarks}`;
        }

        function generateSingle() {
            const uuid = document.getElementById('uuid').value;
            const addr = document.getElementById('address').value;
            const port = document.getElementById('port').value;
            const path = document.getElementById('proxySelect').value;
            const bug = document.getElementById('sni').value;
            const provName = document.getElementById('proxySelect').options[document.getElementById('proxySelect').selectedIndex].text;

            if (!path) return alert("Pilih proxy!");
            
            const link = createVlessLink(uuid, addr, port, path, bug, provName);
            document.getElementById('vlessOutput').value = link;
            document.getElementById('resultBox').style.display = 'block';
        }

        function generateAllSublinks() {
            const uuid = document.getElementById('uuid').value;
            const addr = document.getElementById('address').value;
            const port = document.getElementById('port').value;
            const bug = document.getElementById('sublinkBug').value;

            if (!bug) return alert("Sila masukkan bug terlebih dahulu!");

            let results = [];
            Object.keys(proxyData).forEach(country => {
                proxyData[country].forEach(proxy => {
                    results.push(createVlessLink(uuid, addr, port, proxy.ipPort, bug, `${country}-${proxy.name}`));
                });
            });

            document.getElementById('vlessOutput').value = results.join('\n');
            document.getElementById('resultTitle').textContent = `Berhasil! ${results.length} Sublink Dibuat`;
            document.getElementById('resultBox').style.display = 'block';
        }

        function copyToClipboard() {
            const output = document.getElementById('vlessOutput');
            output.select();
            navigator.clipboard.writeText(output.value);
            alert("Berhasil disalin ke clipboard!");
        }
    </script>
</body>
</html>
