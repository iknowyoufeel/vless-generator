<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS & Full Clash Config Tool</title>
    <style>
        :root { 
            --bg-color: #0f172a; --container-bg: #1e293b; --text-color: #f8fafc; 
            --input-bg: #334155; --border-color: #475569; --primary-color: #3b82f6; 
            --primary-hover: #2563eb; --success-color: #10b981; --warning-color: #f59e0b; 
            --accent-color: #8b5cf6; --clash-color: #fb7185; --table-bg: #1e293b;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--container-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); width: 100%; max-width: 600px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--text-color); padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.3s; white-space: nowrap; font-size: 13px; }
        .tab-btn.active { background-color: var(--primary-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { text-align: center; margin-top: 0; margin-bottom: 25px; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-family: monospace; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-color); }
        
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        
        .section-box { background-color: #283548; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .section-box h4 { margin: 0 0 15px 0; color: var(--warning-color); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        button:hover { background-color: var(--primary-hover); }
        
        .btn-sublink { background-color: var(--accent-color); }
        .btn-clash { background-color: var(--clash-color); }
        .btn-check { background-color: var(--warning-color); }

        .result-box { margin-top: 25px; display: none; }
        .output-area { width: 100%; height: 180px; background-color: #000; color: #0f0; font-size: 11px; margin-top: 10px; }
        
        .table-container { width: 100%; max-height: 300px; overflow-y: auto; margin-top: 15px; border-radius: 6px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #1e293b; position: sticky; top: 0; }
        .status-aktif { color: var(--success-color); font-weight: bold; }
        .status-mati { color: var(--clash-color); font-weight: bold; }
        .status-pending { color: var(--text-color); font-style: italic; }

        .footer-credit { margin-top: 20px; font-size: 13px; color: #94a3b8; text-align: center; }
        .footer-credit span { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>VLESS Web Tool</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'single')">Single</button>
            <button class="tab-btn" onclick="openTab(event, 'sublink')">Sublink</button>
            <button class="tab-btn" onclick="openTab(event, 'convert')">Clash</button>
            <button class="tab-btn" onclick="openTab(event, 'checker')">Cek Proxy</button>
        </div>

        <div id="sharedInputs">
            <div class="form-group">
                <label>User UUID</label>
                <input type="text" id="uuid" placeholder="Loading...">
            </div>
            <div class="row">
                <div class="form-group" style="flex: 2;">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Isi Bug Jika Mode WS" value="">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Port</label>
                    <input type="number" id="port" value="443">
                </div>
            </div>
        </div>

        <div id="single" class="tab-content active">
            <div class="section-box">
                <h4>🌐 Pilih Proxy</h4>
                <div class="row">
                    <div class="form-group"><label>Negara</label><select id="countrySelect"><option>Loading...</option></select></div>
                    <div class="form-group"><label>Provider</label><select id="proxySelect" disabled><option>Pilih Negara</option></select></div>
                </div>
            </div>
            <div class="form-group">
                <label>SNI</label>
                <input type="text" id="sni" placeholder="Isi Bug Jika Mode SNI" value="">
            </div>
            <button onclick="generateSingle()">Buat Satu Link</button>
        </div>

        <div id="sublink" class="tab-content">
            <div class="section-box" style="border-color: var(--accent-color);">
                <h4>🚀 Bulk Generator</h4>
                <div class="form-group">
                    <label>SNI untuk Semua</label>
                    <input type="text" id="sublinkBug" placeholder="Isi Bug Jika Mode SNI" value="">
                </div>
            </div>
            <button class="btn-sublink" onclick="generateAllSublinks()">Buat Semua Sublink</button>
        </div>

        <div id="convert" class="tab-content">
            <div class="section-box" style="border-color: var(--clash-color);">
                <h4>🛠 Clash Config Generator</h4>
                <p style="font-size: 11px; color: #94a3b8; margin-bottom: 10px;">
                    Paste link VLESS di sini. Jika 1 link = Normal Config. Jika banyak link = Auto Load Balance.
                </p>
                <textarea id="clashInput" placeholder="vless://xxxx&#10;vless://yyyy" style="height: 100px;"></textarea>
            </div>
            <button class="btn-clash" onclick="convertToClash()">Buat Config YAML</button>
        </div>

        <div id="checker" class="tab-content">
            <div class="section-box" style="border-color: var(--warning-color);">
                <h4>🔍 Live Proxy Checker</h4>
                <div class="form-group">
                    <label>URL API Vercel Anda</label>
                    <input type="text" id="apiUrl" placeholder="https://api-kamu.vercel.app/api/check" value="https://checkerproxy.vercel.app/api/check">
                </div>
                <button class="btn-check" id="btnMulaiCek" onclick="runChecker()">Mulai Cek Semua Proxy</button>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Prov/Negara</th>
                                <th>IP:Port</th>
                                <th>Status</th>
                                <th>Delay</th>
                            </tr>
                        </thead>
                        <tbody id="checkerBody">
                            <tr><td colspan="4" style="text-align:center;">Tekan tombol untuk memulai</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="result-box" id="resultBox">
            <h3 id="resultTitle" style="font-size: 15px; color: var(--success-color);">Hasil Konfigurasi:</h3>
            <textarea id="vlessOutput" class="output-area" readonly></textarea>
            <button style="background-color: var(--success-color); margin-top: 10px;" onclick="copyToClipboard()">Salin Hasil</button>
        </div>
    </div>

    <div class="footer-credit">
        Created by <span>Orionx</span>
    </div>

    <script>
        let proxyData = {};
        let allProxiesFlat = [];

        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            document.getElementById('resultBox').style.display = 'none';

            if (tabName === 'convert' || tabName === 'checker') {
                document.getElementById('sharedInputs').style.display = 'none';
            } else {
                document.getElementById('sharedInputs').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('uuid').value = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8); 
                return v.toString(16);
            });

            fetch('prolist.txt').then(res => res.text()).then(text => {
                const lines = text.split('\n');
                let currentCountry = '';
                lines.forEach(line => {
                    line = line.trim();
                    if (!line || line.length <= 3 && !line.includes('.') && !line.includes(':')) {
                        if(line) { currentCountry = line; proxyData[currentCountry] = []; }
                    } else if (currentCountry) {
                        const match = line.match(/^(\S+)\s+(.+)$/);
                        if (match) {
                            proxyData[currentCountry].push({ ipPort: match[1], name: match[2] });
                            allProxiesFlat.push({ country: currentCountry, ipPort: match[1], name: match[2] });
                        }
                    }
                });
                populateUi();
            });
        });

        function populateUi() {
            const countrySel = document.getElementById('countrySelect');
            countrySel.innerHTML = '<option value="">-- Pilih Negara --</option>';
            Object.keys(proxyData).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = `${c} (${proxyData[c].length})`;
                countrySel.appendChild(opt);
            });
            countrySel.onchange = function() {
                const proxySel = document.getElementById('proxySelect');
                proxySel.disabled = !this.value;
                if (this.value) {
                    proxySel.innerHTML = '<option value="">-- Pilih Provider --</option>';
                    proxyData[this.value].forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.ipPort; opt.textContent = p.name;
                        proxySel.appendChild(opt);
                    });
                }
            };
        }

        function buildVlessLink(uuid, addr, port, path, bug, name) {
            return `vless://${uuid}@${addr}:${port}?type=ws&security=tls&path=${encodeURIComponent('/'+path)}&sni=${bug}&host=${bug}#${encodeURIComponent(name)}`;
        }

        function generateSingle() {
            const path = document.getElementById('proxySelect').value;
            const addr = document.getElementById('address').value.trim();
            const sni = document.getElementById('sni').value.trim();
            
            if (!path) return alert("Pilih proxy!");
            if (!addr) return alert("Address tidak boleh kosong!");
            
            const country = document.getElementById('countrySelect').value;
            const providerName = document.getElementById('proxySelect').options[document.getElementById('proxySelect').selectedIndex].text;
            const fullName = `${country}-${providerName}`;

            const link = buildVlessLink(document.getElementById('uuid').value, addr, document.getElementById('port').value, path, sni, fullName);
            document.getElementById('vlessOutput').value = link; document.getElementById('resultBox').style.display = 'block';
        }

        function generateAllSublinks() {
            let res = [];
            const uuid = document.getElementById('uuid').value;
            const addr = document.getElementById('address').value.trim();
            const port = document.getElementById('port').value;
            const bug = document.getElementById('sublinkBug').value.trim();
            
            if (!addr) return alert("Address tidak boleh kosong!");

            allProxiesFlat.forEach(p => { res.push(buildVlessLink(uuid, addr, port, p.ipPort, bug, `${p.country}-${p.name}`)); });
            document.getElementById('vlessOutput').value = res.join('\n'); document.getElementById('resultBox').style.display = 'block';
        }

        // DYNAMIC CLASH CONFIG GENERATOR
        function convertToClash() {
            const input = document.getElementById('clashInput').value.trim();
            if(!input) return alert("Paste link VLESS dulu!");
            
            const links = input.split('\n');
            let proxiesList = [];
            let countriesGroup = {};

            links.forEach(link => {
                try {
                    link = link.trim();
                    if(!link.startsWith('vless://')) return;
                    
                    const url = new URL(link); 
                    const params = new URLSearchParams(url.search);
                    
                    let remark = decodeURIComponent(url.hash.substring(1)).trim();
                    if (!remark) remark = 'Proxy';
                    
                    const sniVal = params.get('sni') || '';
                    const hostVal = params.get('host') || sniVal;

                    let country = "GLOBAL";
                    if (remark.includes('-')) {
                        country = remark.split('-')[0].trim().toUpperCase();
                        if (country.length > 3) country = "GLOBAL";
                    }

                    if (!countriesGroup[country]) countriesGroup[country] = [];
                    countriesGroup[country].push(remark);
                    
                    proxiesList.push(`  - name: "${remark}"
    type: vless
    server: ${url.hostname}
    port: ${url.port || 443}
    uuid: ${url.username}
    cipher: none
    tls: true
    skip-cert-verify: true
    servername: ${sniVal}
    network: ws
    ws-opts:
      path: ${decodeURIComponent(params.get('path') || '/')}
      headers:
        Host: ${hostVal}
    udp: true`);
                } catch(e) { console.error(e); }
            });

            if (proxiesList.length === 0) return alert("Tidak ada link VLESS yang valid!");

            let yaml = `mixed-port: 7890\nallow-lan: true\nmode: rule\nlog-level: info\nipv6: false\n\ndns:\n  enable: true\n  listen: 0.0.0.0:1053\n  enhanced-mode: fake-ip\n  nameserver:\n    - 1.1.1.1\n    - 8.8.8.8\n\nproxies:\n`;
            
            yaml += proxiesList.join('\n\n') + '\n\n';
            yaml += `proxy-groups:\n`;

            // === LOGIKA JIKA HANYA 1 PROXY (KONFIG NORMAL) ===
            if (proxiesList.length === 1) {
                let singleName = Object.values(countriesGroup)[0][0]; // Ambil nama proxy
                yaml += `  - name: 🚀 SELECT\n    type: select\n    proxies:\n      - "${singleName}"\n      - DIRECT\n\n`;
                yaml += `rules:\n  - IP-CIDR,127.0.0.0/8,DIRECT\n  - IP-CIDR,10.0.0.0/8,DIRECT\n  - IP-CIDR,172.16.0.0/12,DIRECT\n  - IP-CIDR,192.168.0.0/16,DIRECT\n  - MATCH,🚀 SELECT\n`;
                
                document.getElementById('vlessOutput').value = yaml; 
                document.getElementById('resultBox').style.display = 'block';
                return; // Stop script disini jika hanya 1 link
            }

            // === LOGIKA JIKA > 1 PROXY (KONFIG FULL / BALANCE) ===
            const flags = { 'ID': '🇮🇩', 'SG': '🇸🇬', 'US': '🇺🇸', 'MY': '🇲🇾', 'JP': '🇯🇵', 'HK': '🇭🇰', 'GB': '🇬🇧' };
            let balanceGroups = [];
            let autoGroups = [];

            Object.keys(countriesGroup).forEach(c => {
                const cProxies = countriesGroup[c].map(p => `      - "${p}"`).join('\n');
                const flag = flags[c] || '🏳️';

                yaml += `  # ================= ${c} =================\n`;
                yaml += `  - name: ${flag} ${c}-AUTO\n    type: url-test\n    url: http://www.gstatic.com/generate_204\n    interval: 300\n    proxies:\n${cProxies}\n\n`;
                yaml += `  - name: ${flag} ${c}-BALANCE\n    type: load-balance\n    strategy: round-robin\n    proxies:\n${cProxies}\n\n`;

                balanceGroups.push(`      - ${flag} ${c}-BALANCE`);
                autoGroups.push(`      - ${flag} ${c}-AUTO`);
            });

            yaml += `  # ================= MIX =================\n`;
            yaml += `  - name: ⚖️ AUTO-MIX\n    type: load-balance\n    strategy: round-robin\n    proxies:\n${balanceGroups.join('\n')}\n\n`;
            yaml += `  - name: 🚀 SELECT\n    type: select\n    proxies:\n      - ⚖️ AUTO-MIX\n${autoGroups.join('\n')}\n      - DIRECT\n\n`;

            let idAuto = autoGroups.find(g => g.includes('ID-AUTO')) ? '🇮🇩 ID-AUTO' : '🚀 SELECT';
            let sgAuto = autoGroups.find(g => g.includes('SG-AUTO')) ? '🇸🇬 SG-AUTO' : '🚀 SELECT';

            yaml += `rules:\n  - IP-CIDR,127.0.0.0/8,DIRECT\n  - IP-CIDR,10.0.0.0/8,DIRECT\n  - IP-CIDR,172.16.0.0/12,DIRECT\n  - IP-CIDR,192.168.0.0/16,DIRECT\n\n  # Indonesia → ID\n  - GEOIP,ID,${idAuto.replace('      - ', '')}\n\n  # Default Global\n  - MATCH,${sgAuto.replace('      - ', '')}\n`;

            document.getElementById('vlessOutput').value = yaml; 
            document.getElementById('resultBox').style.display = 'block';
        }

        async function runChecker() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            if(!apiUrl) return alert("Harap isi URL API Vercel Anda terlebih dahulu!");

            const tbody = document.getElementById('checkerBody');
            const btn = document.getElementById('btnMulaiCek');
            tbody.innerHTML = '';
            btn.disabled = true;
            btn.textContent = "Sedang Mengecek...";

            allProxiesFlat.forEach((p, i) => {
                tbody.innerHTML += `<tr>
                    <td>${p.name} (${p.country})</td>
                    <td style="font-size: 10px;">${p.ipPort}</td>
                    <td id="stat-${i}" class="status-pending">Wait..</td>
                    <td id="del-${i}">-</td>
                </tr>`;
            });

            for (let i = 0; i < allProxiesFlat.length; i += 10) {
                const chunk = allProxiesFlat.slice(i, i + 10);
                const ips = chunk.map(x => x.ipPort).join(',');
                try {
                    const res = await fetch(`${apiUrl}?ip=${ips}`);
                    const data = await res.json();
                    const dataArr = Array.isArray(data) ? data : [data];
                    
                    dataArr.forEach(resObj => {
                        const reqProxyFormat = `${resObj.proxy}:${resObj.port}`;
                        const idx = allProxiesFlat.findIndex(x => {
                            const full = x.ipPort.includes(':') ? x.ipPort : x.ipPort + ':443';
                            return full === reqProxyFormat;
                        });

                        if(idx !== -1) {
                            const statTd = document.getElementById(`stat-${idx}`);
                            if(resObj.proxyip) {
                                statTd.textContent = 'Aktif'; statTd.className = 'status-aktif';
                            } else {
                                statTd.textContent = 'Mati'; statTd.className = 'status-mati';
                            }
                            document.getElementById(`del-${idx}`).textContent = resObj.delay || '-';
                        }
                    });
                } catch (error) {
                    chunk.forEach(p => {
                        const idx = allProxiesFlat.findIndex(x => x.ipPort === p.ipPort);
                        document.getElementById(`stat-${idx}`).textContent = 'Error';
                        document.getElementById(`stat-${idx}`).className = 'status-mati';
                    });
                }
            }
            btn.disabled = false;
            btn.textContent = "Mulai Cek Semua Proxy";
        }

        function copyToClipboard() {
            const out = document.getElementById('vlessOutput'); 
            out.select(); 
            navigator.clipboard.writeText(out.value); 
            alert("Salin Berhasil!");
        }
    </script>
</body>
</html>
